name: miniproject_timetable_manager
description: "A complete Timetable Manager with SQLite persistence and notifications."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  sqflite: ^2.3.0
  path_provider: ^2.1.1
  flutter_local_notifications: ^21.0.0
  provider: ^6.1.1
  intl: ^0.19.0
  timezone: ^0.11.0
  google_fonts: ^6.1.0
  path: ^1.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
